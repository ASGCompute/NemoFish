services:
  nemofish:
    image: ghcr.io/666ghj/nemofish:latest
    # Mirror for faster pulling (replace above address if download is slow)
    # image: ghcr.nju.edu.cn/666ghj/nemofish:latest
    container_name: nemofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads